<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bloodstone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Unbounded:wght@200;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #040404;
      --surface: #0a0a0a;
      --border: #2a2a2a;
      --border-bright: #3a3a3a;
      --text: #e8e8e0;
      --muted: #555550;
      --accent: #cc1a1a;
      --accent-dim: #3a0808;
      --accent-bright: #ff2222;
      --output-bg: #060606;
      --font-display: 'Unbounded', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      background: var(--surface);
    }

    header h1 {
      font-family: var(--font-display);
      font-weight: 200;
      font-size: 12px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--accent);
    }

    header span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    header .status {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.2em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .status::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* MAIN LAYOUT */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100%;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-left {
      border-right: 1px solid var(--border);
    }

    .panel-label {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.8;
      padding: 22px 20px;
      resize: none;
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    /* OUTPUT */
    .output-area {
      flex: 1;
      padding: 22px 20px;
      overflow-y: auto;
      background: var(--output-bg);
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.9;
      color: var(--text);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .output-area.empty {
      color: var(--muted);
    }

    .output-area .thinking {
      color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    /* COPY BUTTON */
    .copy-btn {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .copy-btn:hover { color: var(--accent); }
    .copy-btn.copied { color: var(--accent-bright); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--surface);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .control-group label {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    /* step buttons */
    .step-btn {
      width: 18px;
      height: 18px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0 0 1px 0;
      flex-shrink: 0;
      user-select: none;
    }

    .step-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .step-btn:active {
      background: var(--accent-dim);
    }

    .control-group input[type="range"] {
      -webkit-appearance: none;
      width: 65px;
      height: 1px;
      background: var(--border-bright);
      outline: none;
      cursor: pointer;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 9px;
      height: 9px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .control-group .val {
      font-size: 11px;
      color: var(--accent);
      min-width: 32px;
      font-family: var(--font-mono);
    }

    .system-toggle {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-mono);
      padding: 4px 0;
      transition: color 0.15s;
    }

    .system-toggle:hover { color: var(--accent); }

    .transmute-btn {
      background: none;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      padding: 10px 22px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .transmute-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent-bright);
    }

    .transmute-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    /* SYSTEM DRAWER */
    .system-drawer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }

    .system-drawer.open {
      max-height: 140px;
    }

    .system-drawer textarea {
      padding: 14px 20px;
      font-size: 12px;
      color: var(--muted);
      height: 140px;
    }

    .system-drawer textarea:focus {
      color: var(--text);
    }

    .error-msg {
      color: #882222;
      font-size: 12px;
      font-style: italic;
    }

    .divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      flex-shrink: 0;
    }

    @media (max-width: 680px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>

<header>
  <h1>bloodstone</h1>
  <span>transmutation engine</span>
  <div class="status">online</div>
</header>

<main>
  <div class="panel panel-left">
    <div class="panel-label"><span>input</span></div>
    <textarea id="input" placeholder="feed it something..."></textarea>
  </div>

  <div class="panel panel-right">
    <div class="panel-label">
      <span>output</span>
      <button class="copy-btn" id="copyBtn">copy</button>
    </div>
    <div class="output-area empty" id="output">waiting.</div>
  </div>
</main>

<div class="system-drawer" id="systemDrawer">
  <textarea id="systemPrompt" placeholder="system prompt..."></textarea>
</div>

<footer>
  <div class="controls">

    <div class="control-group">
      <label>temp</label>
      <button class="step-btn" data-target="temp" data-dir="-1">−</button>
      <input type="range" id="temp" min="0.1" max="2.0" step="0.05" value="1.2">
      <button class="step-btn" data-target="temp" data-dir="1">+</button>
      <span class="val" id="tempVal">1.20</span>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>pres</label>
      <button class="step-btn" data-target="presence" data-dir="-1">−</button>
      <input type="range" id="presence" min="0" max="2.0" step="0.05" value="0.0">
      <button class="step-btn" data-target="presence" data-dir="1">+</button>
      <span class="val" id="presenceVal">0.00</span>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>freq</label>
      <button class="step-btn" data-target="frequency" data-dir="-1">−</button>
      <input type="range" id="frequency" min="0" max="2.0" step="0.05" value="0.0">
      <button class="step-btn" data-target="frequency" data-dir="1">+</button>
      <span class="val" id="frequencyVal">0.00</span>
    </div>

    <div class="divider"></div>

    <button class="system-toggle" id="systemToggle">[ system ]</button>

  </div>

  <button class="transmute-btn" id="submitBtn">transmute</button>
</footer>

<script>
  const WORKER_URL = "https://bloodstone.1222hz.workers.dev";
  const DEFAULT_SYSTEM = "You are not the wall, you are a brick on the wall. A part of the whole. Speak in fragments of free-verse poetry.";

  const inputEl     = document.getElementById("input");
  const outputEl    = document.getElementById("output");
  const submitBtn   = document.getElementById("submitBtn");
  const copyBtn     = document.getElementById("copyBtn");
  const tempEl      = document.getElementById("temp");
  const tempVal     = document.getElementById("tempVal");
  const presenceEl  = document.getElementById("presence");
  const presenceVal = document.getElementById("presenceVal");
  const frequencyEl = document.getElementById("frequency");
  const frequencyVal= document.getElementById("frequencyVal");
  const systemEl    = document.getElementById("systemPrompt");
  const systemToggle= document.getElementById("systemToggle");
  const systemDrawer= document.getElementById("systemDrawer");

  systemEl.value = DEFAULT_SYSTEM;

  function fmt(v) { return parseFloat(v).toFixed(2); }

  tempEl.addEventListener("input", () => tempVal.textContent = fmt(tempEl.value));
  presenceEl.addEventListener("input", () => presenceVal.textContent = fmt(presenceEl.value));
  frequencyEl.addEventListener("input", () => frequencyVal.textContent = fmt(frequencyEl.value));

  // +/- step buttons
  document.querySelectorAll(".step-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = document.getElementById(btn.dataset.target);
      const dir = parseInt(btn.dataset.dir);
      const step = parseFloat(target.step);
      const min = parseFloat(target.min);
      const max = parseFloat(target.max);
      const newVal = Math.min(max, Math.max(min, parseFloat(target.value) + dir * step));
      target.value = newVal.toFixed(2);
      target.dispatchEvent(new Event("input"));
    });
  });

  // system drawer
  systemToggle.addEventListener("click", () => {
    systemDrawer.classList.toggle("open");
  });

  // copy button
  copyBtn.addEventListener("click", () => {
    const txt = outputEl.textContent;
    if (!txt || outputEl.classList.contains("empty")) return;
    navigator.clipboard.writeText(txt).then(() => {
      copyBtn.textContent = "copied";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.textContent = "copy";
        copyBtn.classList.remove("copied");
      }, 1500);
    });
  });

  // cmd/ctrl + enter
  inputEl.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") transmute();
  });

  submitBtn.addEventListener("click", transmute);

  async function transmute() {
    const prompt = inputEl.value.trim();
    if (!prompt) return;

    submitBtn.disabled = true;
    outputEl.className = "output-area";
    outputEl.innerHTML = '<span class="thinking">transmuting...</span>';

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt,
          system: systemEl.value.trim() || DEFAULT_SYSTEM,
          temperature: parseFloat(tempEl.value),
          presence_penalty: parseFloat(presenceEl.value),
          frequency_penalty: parseFloat(frequencyEl.value)
        })
      });

      const data = await res.json();

      if (!res.ok) {
        outputEl.innerHTML = `<span class="error-msg">signal lost. ${JSON.stringify(data.error)}</span>`;
        return;
      }

      outputEl.textContent = data.text;
      outputEl.className = "output-area";

    } catch (err) {
      outputEl.innerHTML = `<span class="error-msg">no signal. ${err.message}</span>`;
    } finally {
      submitBtn.disabled = false;
    }
  }
</script>
</body>
</html>
